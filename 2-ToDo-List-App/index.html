<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>To-Do List App | Debaraj Mohanty</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <h1><i class="fa-solid fa-list-check"></i> To-Do List App</h1>

        <p>Organize your daily tasks efficiently.</p>

    </header>

    <!-- ================= MAIN CONTAINER ================= -->

    <div class="container">

        <!-- Add Task Section -->

        <div class="task-input">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task...">

            <button id="addTaskBtn">

                <i class="fa-solid fa-plus"></i>

                Add Task

            </button>

        </div>

        <!-- Search & Filter -->

        <div class="controls">

            <input
                type="text"
                id="searchTask"
                placeholder="Search tasks...">

            <select id="filterTask">

                <option value="all">All Tasks</option>

                <option value="completed">Completed</option>

                <option value="pending">Pending</option>

            </select>

        </div>
                <!-- ================= TASK LIST ================= -->

        <div class="task-container">

            <ul id="taskList">

                <!-- Tasks will be added here dynamically using JavaScript -->

            </ul>

            <!-- Empty Message -->

            <div id="emptyMessage">

                <i class="fa-solid fa-clipboard-list"></i>

                <h3>No Tasks Yet</h3>

                <p>Add your first task to get started!</p>

            </div>

        </div>

        <!-- ================= ACTION BUTTONS ================= -->

        <div class="action-buttons">

            <button id="clearCompletedBtn">

                <i class="fa-solid fa-check-double"></i>

                Clear Completed

            </button>

            <button id="clearAllBtn">

                <i class="fa-solid fa-trash"></i>

                Clear All

            </button>

        </div>

    </div>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            © 2026 Debaraj Mohanty | Built with

            <i class="fa-solid fa-heart"></i>

            using HTML, CSS & JavaScript

        </p>

    </footer>

    <!-- ================= JAVASCRIPT ================= -->

    <script src="script.js"></script>

</body>

</html>
